{% extends 'base.html' %}

{% block base %}

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Give Feedback</h2>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Submit Feedback
            </button>

        </form>

    </div>
</div>

{% endblock %}
